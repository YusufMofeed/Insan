name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore Insan.sln

      - name: Build solution
        run: dotnet build Insan.sln --configuration Release --no-restore /warnaserror

      - name: Run tests
        run: dotnet test Insan.sln --configuration Release --no-build --verbosity normal

  docker-build:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Insan.API Dockerfile builds
        run: docker build -f Insan.API/Dockerfile -t insan-api:ci .
