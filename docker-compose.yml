services:
  api:
    build:
      context: ./backend
      dockerfile: Insan.API/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=insan;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}"
      Jwt__Key: "${JWT_KEY:?JWT_KEY environment variable must be set}"
      Jwt__Issuer: "${JWT_ISSUER:-Insan}"
      Jwt__Audience: "${JWT_AUDIENCE:-InsanClients}"
      Jwt__ExpiryMinutes: "60"
      Cors__AllowedOrigins__0: "${CORS_ALLOWED_ORIGIN:?CORS_ALLOWED_ORIGIN environment variable must be set to the deployed frontend's origin, e.g. https://insan.example.com}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - insan-network

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: insan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - insan-network

networks:
  insan-network:
    driver: bridge

volumes:
  postgres-data:
